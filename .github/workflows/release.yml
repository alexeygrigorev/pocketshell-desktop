name: Release

on:
  push:
    tags:
      - "v*"

env:
  NODE_VERSION: "24"

jobs:
  # ── Run unit tests first ──────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  # ── Build and package per platform ────────────────────────────────────
  build:
    name: Build and package (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: win32-x64
            runner: windows-latest
            ext: exe
          - target: darwin-arm64
            runner: macos-latest
            ext: dmg
          - target: darwin-x64
            runner: macos-13
            ext: dmg
          - target: linux-x64
            runner: ubuntu-latest
            ext: AppImage
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Linux needs extra deps for electron-builder
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Clone VS Code (shallow)
        run: |
          if [ ! -d vendor/vscode/.git ]; then
            git clone --depth 1 https://github.com/microsoft/vscode.git vendor/vscode
          fi
        shell: bash

      - name: Apply branding
        shell: bash
        run: |
          if [ -f product.json ]; then
            cp product.json vendor/vscode/product.json
          fi

      - name: Build
        run: npm run build
        shell: bash

      - name: Package with electron-builder
        run: npm run package -- --target ${{ matrix.target }}
        shell: bash

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocketshell-${{ matrix.target }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
          retention-days: 5
          if-no-files-found: warn

  # ── Create GitHub Release ─────────────────────────────────────────────
  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: pocketshell-*

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Generate release notes
        id: notes
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "## What's Changed" > release-notes.md
            echo "" >> release-notes.md
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" >> release-notes.md
          else
            echo "## Initial Release" > release-notes.md
          fi
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          generate_release_notes: false
          files: artifacts/**/*
