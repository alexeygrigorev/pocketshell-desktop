name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  VSCODE_REF: 037f7fbe03f78896c841adfd57aea4e0c85ccbc7

jobs:
  prepare-base:
    name: Prepare base (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    # Must accommodate the sum of per-step timeouts on a cold cache miss:
    # clone 10 + install 60 + compile 45 + electron 15 = 130 min.
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
          - platform: win32-x64
            runner: windows-2022
          - platform: darwin-arm64
            runner: macos-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxkbfile-dev libsecret-1-dev libkrb5-dev

      # ── Cache compiled VS Code base ───────────────────────
      - name: Cache VS Code base
        id: cache-base
        uses: actions/cache@v4
        with:
          path: vendor/vscode
          key: vscode-${{ env.VSCODE_REF }}-${{ matrix.platform }}-base-v2

      # ── Clone + install + compile (cache miss only) ───────
      - name: Clone VS Code source
        if: steps.cache-base.outputs.cache-hit != 'true'
        timeout-minutes: 10
        shell: bash
        run: |
          mkdir -p vendor
          git clone --depth=1 https://github.com/microsoft/vscode.git vendor/vscode
          cd vendor/vscode
          git fetch --depth=1 origin "${{ env.VSCODE_REF }}"
          git checkout FETCH_HEAD

      # Skip Playwright browser + Electron postinstall downloads: they stall on the
      # runner and aren't needed for production packaging (gulp vscode-{platform}).
      # Electron is fetched in the dedicated "Download Electron" step below.
      - name: Install VS Code dependencies
        if: steps.cache-base.outputs.cache-hit != 'true'
        timeout-minutes: 60
        shell: bash
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd vendor/vscode && npm install --foreground-scripts --no-audit --no-fund

      - name: Compile VS Code core
        if: steps.cache-base.outputs.cache-hit != 'true'
        timeout-minutes: 45
        shell: bash
        run: cd vendor/vscode && npm run gulp compile

      - name: Download Electron
        if: steps.cache-base.outputs.cache-hit != 'true'
        timeout-minutes: 15
        shell: bash
        run: cd vendor/vscode && npm run electron

  build:
    name: Build ${{ matrix.platform }}
    needs: prepare-base
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            artifact: pocketshell-linux-x64
          - platform: win32-x64
            runner: windows-2022
            artifact: pocketshell-windows-x64
          - platform: darwin-arm64
            runner: macos-latest
            artifact: pocketshell-darwin-arm64

    env:
      # Force LF checkout on all runners. On windows-2022, git's autocrlf would
      # otherwise check the repo out with CRLF, which breaks steps that match
      # \n-anchored patterns in checked-out files (e.g. the version bump). The
      # vendored VS Code source (restored from cache, CRLF) is handled
      # separately by read()-normalization in scripts/patch-vscode-build.js.
      GIT_CONFIG_COUNT: '1'
      GIT_CONFIG_KEY_0: 'core.autocrlf'
      GIT_CONFIG_VALUE_0: 'false'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxkbfile-dev libsecret-1-dev libkrb5-dev

      # ── Restore compiled VS Code base (must be present) ───
      - name: Cache VS Code base
        id: cache-base
        uses: actions/cache@v4
        with:
          path: vendor/vscode
          key: vscode-${{ env.VSCODE_REF }}-${{ matrix.platform }}-base-v2
          fail-on-cache-miss: true

      # ── PocketShell extension (every run) ──────────────────
      - name: Apply PocketShell branding
        shell: bash
        run: cp product.json vendor/vscode/product.json

      - name: Apply PocketShell VS Code build patches
        shell: bash
        run: node scripts/patch-vscode-build.js

      - name: Sync extension source
        shell: bash
        run: |
          mkdir -p vendor/vscode/extensions/pocketshell
          cp -r extensions/pocketshell/* vendor/vscode/extensions/pocketshell/
          rm -rf vendor/vscode/extensions/pocketshell/node_modules
          rm -rf vendor/vscode/extensions/pocketshell/out
          rm -f vendor/vscode/extensions/pocketshell/tsconfig.tsbuildinfo

      - name: Install extension npm dependencies
        shell: bash
        run: cd vendor/vscode/extensions/pocketshell && npm install --omit=optional

      - name: Compile PocketShell extension
        shell: bash
        run: |
          cd vendor/vscode
          npm run gulp compile-extension:pocketshell 2>/dev/null || \
            npx tsc -p extensions/pocketshell/tsconfig.json
          test -f extensions/pocketshell/out/extension.js

      # ── Stamp built extension before any packaging ───────────────────
      # Both the delta zip (below) and the production gulp build consume the
      # SAME files in vendor/vscode/extensions/pocketshell, so these stamps
      # MUST run before either consumer touches the dir.

      # Write base-version.json as a dedicated, explicit step (single source
      # of truth). The updater reads <extensionPath>/base-version.json and
      # string-compares it to the manifest's baseVersion, so this value must
      # be byte-identical to BASE_VERSION used in the delta step below.
      # Previously this was written inline inside the delta step, which meant
      # the full-archive production build only got it as an ordering side
      # effect; reordering/gating the delta step would leave fresh installs
      # with baseVersion='dev' and unable to ever delta-update.
      - name: Write base-version.json
        shell: bash
        run: |
          set -euo pipefail
          EXT_DIR="vendor/vscode/extensions/pocketshell"
          BASE_VERSION="${VSCODE_REF:0:12}"
          printf '{"baseVersion":"%s"}\n' "$BASE_VERSION" > "$EXT_DIR/base-version.json"
          echo "Wrote $EXT_DIR/base-version.json:"
          cat "$EXT_DIR/base-version.json"

      # Bump the BUILT extension's package.json version to the git tag (tag
      # without leading 'v', e.g. v0.1.4 -> 0.1.4). The updater reads
      # currentVersion from context.extension.packageJSON.version; without
      # this bump the manifest says 0.1.4 but the built extension (and the
      # delta zip's package.json) still report the old version, so
      # isNewer("0.1.4","0.1.3") stays true forever and the updater re-offers
      # the same delta indefinitely. Avoids `npm version` (it mutates
      # package-lock and fires lifecycle hooks).
      - name: Bump built extension version to tag
        # Only stamp a real version on tag builds. The trigger also allows
        # workflow_dispatch (manual runs off a branch); on those, GITHUB_REF_NAME
        # is the branch name (e.g. "main"), which would write a bogus
        # package.json version ("main") and, via the delta manifest, cause the
        # updater to re-offer the same delta indefinitely. Skip the bump on
        # non-tag runs — the full-archive build still works with the in-tree
        # dev version for manual/CI smoke builds; only tag builds ship.
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          EXT_DIR="vendor/vscode/extensions/pocketshell"
          VERSION="${GITHUB_REF_NAME:-dev}"
          VERSION_NO_V="${VERSION#v}"
          cd "$EXT_DIR"
          # SURGICAL version bump: edit only the "version" value via regex so we
          # do NOT reformat the rest of package.json (the source uses tabs; a
          # JSON.parse -> JSON.stringify round-trip would rewrite it to 2-space
          # indent and create a noisy/meaningless diff in the shipped package).
          # Fails loudly if the version line isn't found rather than no-oping.
          # The \r?\n anchors (not \n) make this CRLF-tolerant: on windows-2022
          # the Sync extension source step `cp`s this package.json from the
          # checked-out repo, which actions/checkout@v4 may hand out with CRLF
          # (git autocrlf); a \n-only regex would fail to match and break the
          # build. See also the build job's GIT_CONFIG_COUNT below.
          node -e '
            const fs = require("fs");
            const file = "package.json";
            const src = fs.readFileSync(file, "utf8");
            const re = /(^|\r?\n)([ \t]*"version"[ \t]*:[ \t]*)"[^"\r\n]*"([ \t]*(,\r?\n|\r?\n))/;
            if (!re.test(src)) {
              console.error("ERROR: could not find a \"version\" field to bump in " + file);
              process.exit(1);
            }
            const next = src.replace(re, (m, lead, key, tail) => `${lead}${key}"${process.argv[1]}"${tail}`);
            fs.writeFileSync(file, next);
          ' "${VERSION_NO_V}"
          echo "Bumped $EXT_DIR/package.json version to ${VERSION_NO_V}:"
          node -e 'console.log(JSON.parse(require("fs").readFileSync("package.json","utf8")).version)'

      # ── Extension-delta artifacts (issue #96) ────────────────────────
      # Package a zip of the PocketShell extension layer so the in-app updater
      # can offer incremental updates instead of re-downloading the ~300MB full
      # archive. This bundles the extension's node_modules (incl. ssh2's
      # platform-specific native sshcrypto.node), so it is ~tens of MB — still
      # roughly an order of magnitude smaller than the full archive. Because it
      # ships a platform-specific native, this MUST run per-platform on each
      # matrix runner and produce platform-keyed assets.
      #
      # baseVersion source: the pinned VS Code ref's short sha (first 12 chars
      # of VSCODE_REF). This same value is written into BOTH base-version.json
      # (read by the updater from the running extension dir) and the manifest's
      # baseVersion field, so the updater's string comparison matches
      # byte-for-byte. VSCODE_REF is defined at the top of this workflow.
      - name: Package extension-delta zip + manifest (${{ matrix.platform }})
        # Tag-only: the manifest's version/downloadUrl encode the tag, and the
        # updater re-offers deltas whose version it can't order. Off-tag
        # (workflow_dispatch) runs must NOT produce a delta manifest (they'd
        # publish a bogus "main"/"dev" version keyed to the wrong release URL).
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          EXT_DIR="vendor/vscode/extensions/pocketshell"
          # Tag; fall back to "dev" off-tag. version (manifest) is the tag
          # WITHOUT the leading 'v' (e.g. v0.1.4 -> 0.1.4) to match the
          # extension's own package.json version the updater reads. Asset
          # filenames use the full tag (e.g. v0.1.4), matching the full-archive
          # naming (pocketshell-v0.1.4-<platform>).
          VERSION="${GITHUB_REF_NAME:-dev}"
          VERSION_NO_V="${VERSION#v}"
          # Short form of the pinned VS Code base (identical source in every
          # artifact: env.VSCODE_REF defined at the top of this workflow).
          # base-version.json itself is written by the dedicated
          # "Write base-version.json" step above; we only reference the value
          # here for the manifest's baseVersion field.
          BASE_VERSION="${VSCODE_REF:0:12}"
          PLATFORM="${{ matrix.platform }}"
          ZIP_NAME="pocketshell-extension-${VERSION}-${PLATFORM}.zip"
          MANIFEST_NAME="latest-${PLATFORM}.json"
          ZIP_PATH="$GITHUB_WORKSPACE/$ZIP_NAME"
          MANIFEST_PATH="$GITHUB_WORKSPACE/$MANIFEST_NAME"
          REPO="${GITHUB_REPOSITORY}"

          # 1. Package the extension dir's CONTENTS at the top level (flat
          #    layout) into a deflate zip. The updater's installer extracts
          #    entries directly over context.extensionPath with no parent-dir
          #    stripping, so a nested `pocketshell/` wrapper would break
          #    installation.
          #
          #    This is a portable Node packager (scripts/package-extension-delta.mjs,
          #    using `yazl` — the library npm uses to CREATE zips). It replaces
          #    the previous `( cd "$EXT_DIR" && zip -r -X ... )` shell-out
          #    because `zip` is NOT available on the windows-2022 runner
          #    (actions/runner-images lists only `7zip`, not `zip`; MSYS2/
          #    Git-Bash require `pacman -S zip`), so the old step FAILED on
          #    the win32-x64 matrix job and broke every Windows release.
          #    Neither create nor validate may shell out to a system archive
          #    tool — Node IS guaranteed on all three runners.
          #
          #    yazl is resolved from vendor/vscode/node_modules/yazl in CI
          #    (it is a declared VS Code dep; prepare-base runs `npm install`
          #    there and caches vendor/vscode). The build job does NOT run a
          #    root `npm install`, so $GITHUB_WORKSPACE/node_modules is absent
          #    here — the script's fallback to the vendored path is what makes
          #    this work in CI.
          node "$GITHUB_WORKSPACE/scripts/package-extension-delta.mjs" "$EXT_DIR" "$ZIP_PATH"
          # Validate the zip layout with a portable Node helper. The previous
          # `unzip -Z1 | grep` check was NOT portable: `unzip` is not guaranteed
          # on the windows-2022 runner's Git-Bash, so it silently no-oped on
          # Windows and a nested zip could ship undetected. Node IS guaranteed
          # on all three runners. The helper also asserts the POSITIVE case
          # (required entries present), not just the negative (no pocketshell/
          # prefix). The helper is at the repo root ($GITHUB_WORKSPACE/scripts)
          # and the zip is an absolute path, so this works regardless of the
          # packager's cwd.
          node "$GITHUB_WORKSPACE/scripts/check-delta-zip.mjs" "$ZIP_PATH"

          # 2. sha256 of the zip (lowercase hex, as parseManifest requires).
          SHA="$(sha256sum "$ZIP_PATH" | awk '{print $1}')"
          echo "sha256($ZIP_NAME) = $SHA"

          # 3. Manifest. downloadUrl MUST match the uploaded asset filename
          #    exactly ($ZIP_NAME). Built with printf to keep JSON deterministic
          #    and avoid heredoc indentation pitfalls.
          printf '{\n  "version": "%s",\n  "downloadUrl": "https://github.com/%s/releases/download/%s/%s",\n  "sha256": "%s",\n  "baseVersion": "%s"\n}\n' \
            "$VERSION_NO_V" "$REPO" "$VERSION" "$ZIP_NAME" "$SHA" "$BASE_VERSION" \
            > "$MANIFEST_PATH"
          echo "--- $MANIFEST_NAME ---"
          cat "$MANIFEST_PATH"

          # Stash paths for the upload step.
          echo "DELTA_ZIP=$ZIP_PATH" >> "$GITHUB_ENV"
          echo "DELTA_MANIFEST=$MANIFEST_PATH" >> "$GITHUB_ENV"

      - name: Upload extension-delta artifacts
        # Skip on non-tag runs: the delta step (tag-only) did not produce any
        # files, so DELTA_ZIP/DELTA_MANIFEST are unset. Without this guard the
        # upload step's `if-no-files-found: error` would fail the build.
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: pocketshell-extension-${{ matrix.platform }}
          path: |
            ${{ env.DELTA_ZIP }}
            ${{ env.DELTA_MANIFEST }}
          if-no-files-found: error

      - name: Add Windows SDK to PATH (signtool.exe)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # VS Code's patchWin32DependenciesTask spawns signtool.exe to verify/strip
          # Authenticode signatures on bundled native dependencies. signtool.exe ships
          # with the Windows SDK but is not on PATH by default. Discover the installed
          # SDK version dynamically and put its x64 bin on PATH for the gulp build
          # (mirrors VS Code's own CI in build/azure-pipelines/win32/steps/...yml).
          $sdkRoot = 'C:\Program Files (x86)\Windows Kits\10\bin'
          $sdkBin = Get-ChildItem -Path $sdkRoot -Directory -ErrorAction SilentlyContinue |
                    Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' -and (Test-Path (Join-Path $_.FullName 'x64\signtool.exe')) } |
                    Sort-Object Name -Descending |
                    Select-Object -First 1
          if (-not $sdkBin) {
            Write-Error "Windows SDK with x64\signtool.exe not found under $sdkRoot"
            exit 1
          }
          $x64 = Join-Path $sdkBin.FullName 'x64'
          Add-Content -Path $env:GITHUB_PATH -Value $x64
          Write-Host "Added $x64 to GITHUB_PATH"

      - name: Prune non-win32 native modules
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -e
          # VS Code's patchWin32DependenciesTask runs rcedit on every **/*.node in
          # the packaged output. The built-in copilot extension's @anthropic-ai/
          # claude-agent-sdk vendors audio-capture.node for ALL platforms; the
          # darwin/linux variants are Mach-O/ELF, not Windows PEs, so rcedit fails
          # ("Unable to load file", e.g. arm64-darwin/audio-capture.node). Delete
          # non-win32 .node variants at the source so they never reach the output.
          # Patterns cover both {plat}-{arch} and {arch}-{plat} orderings.
          cd vendor/vscode
          mapfile -t victims < <(find extensions -type f -name '*.node' \( -path '*darwin*' -o -path '*linux*' \) | sort)
          if [ ${#victims[@]} -gt 0 ]; then
            printf '%s\n' "${victims[@]}"
            rm -f -- "${victims[@]}"
            echo "Pruned ${#victims[@]} non-win32 .node file(s)"
          else
            echo "No non-win32 .node files found"
          fi

      # ── Production build ───────────────────────────────────
      - name: Production build (${{ matrix.platform }})
        timeout-minutes: 60
        shell: bash
        run: cd vendor/vscode && npm run gulp vscode-${{ matrix.platform }}

      - name: Package build output
        shell: bash
        run: |
          OUTPUT_DIR=""
          for candidate in \
            "vendor/vscode/.build/vscode-${{ matrix.platform }}" \
            "vendor/VSCode-${{ matrix.platform }}" \
            "vendor/vscode/VSCode-${{ matrix.platform }}"; do
            if [ -d "$candidate" ]; then
              OUTPUT_DIR="$candidate"
              break
            fi
          done
          if [ -z "$OUTPUT_DIR" ]; then
            echo "Build output not found"
            find vendor -maxdepth 4 -type d -iname "*vscode*" 2>/dev/null || true
            exit 1
          fi
          echo "Found build output at: $OUTPUT_DIR"
          VERSION="${GITHUB_REF_NAME:-dev}"
          cd "$OUTPUT_DIR"
          if [[ "${{ matrix.platform }}" == win32-* ]]; then
            ZIP_NAME="pocketshell-${VERSION}-${{ matrix.platform }}.zip"
            7z a -tzip "$GITHUB_WORKSPACE/$ZIP_NAME" . 2>/dev/null || \
              powershell -Command "Compress-Archive -Path '.\*' -DestinationPath '$GITHUB_WORKSPACE/$ZIP_NAME'"
            echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"
          else
            ZIP_NAME="pocketshell-${VERSION}-${{ matrix.platform }}.tar.gz"
            tar czf "$GITHUB_WORKSPACE/$ZIP_NAME" .
            echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"
          fi
          echo "Created $ZIP_NAME"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: pocketshell-*
          if-no-files-found: error

  release:
    name: Create release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/

      - name: Flatten release assets
        run: |
          mkdir -p release-files
          # Full archives (*.zip / *.tar.gz) plus the per-platform extension-delta
          # zips and their manifests (issue #96). The delta zips are *.zip so they
          # are already caught by the first glob; the manifests are gathered
          # explicitly.
          find release-assets -type f \
            \( -name '*.zip' -o -name '*.tar.gz' -o -name 'latest-*.json' \) \
            -exec cp {} release-files/ \;
          ls -lh release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-files/*
