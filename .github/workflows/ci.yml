name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  # VS Code core is upstream; pin the exact commit we build against.
  # Must match release.yml.
  VSCODE_REF: 037f7fbe03f78896c841adfd57aea4e0c85ccbc7

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npm run lint

  # ── Build (extension compile only) ────────────────────────────────────
  # VS Code core is upstream — the only thing CI validates per-push is that
  # the PocketShell extension compiles. The full core compile + production
  # packaging happens in release.yml on tag pushes and is NOT repeated here.
  build:
    name: Build (extension)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Install Linux build deps
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxkbfile-dev libsecret-1-dev libkrb5-dev

      # ── Cache VS Code source + deps (keyed by pinned ref) ──────────────
      # Includes node_modules and the patched gulpfile/extensions.ts so cache
      # hits skip the slow clone+install+patch steps on every run.
      - name: Cache VS Code base
        id: cache-base
        uses: actions/cache@v4
        with:
          path: vendor/vscode
          key: vscode-${{ env.VSCODE_REF }}-ext-compile-v1

      # ── Clone + install + patch (cache miss only) ──────────────────────
      - name: Clone VS Code source
        if: steps.cache-base.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p vendor
          git clone --depth=1 https://github.com/microsoft/vscode.git vendor/vscode
          cd vendor/vscode
          git fetch --depth=1 origin "${{ env.VSCODE_REF }}"
          git checkout FETCH_HEAD

      - name: Install VS Code dependencies
        if: steps.cache-base.outputs.cache-hit != 'true'
        shell: bash
        run: cd vendor/vscode && npm install

      - name: Patch gulpfile for PocketShell extension
        if: steps.cache-base.outputs.cache-hit != 'true'
        shell: bash
        run: |
          cat > /tmp/patch-gulpfile.js << 'PATCH_EOF'
          const fs = require('fs');
          const filePath = 'vendor/vscode/build/gulpfile.extensions.ts';
          let content = fs.readFileSync(filePath, 'utf8');
          const compilationsMatch = content.match(/^const compilations = \[$/m);
          if (!compilationsMatch) { process.exit(1); }
          const compilationsStart = compilationsMatch.index;
          const compilationsEnd = content.indexOf('];', compilationsStart);
          if (compilationsEnd === -1) { process.exit(1); }
          const arrayBlock = content.slice(compilationsStart, compilationsEnd + 2);
          if (arrayBlock.includes('pocketshell')) { process.exit(0); }
          const newArrayBlock = arrayBlock.replace(/\];$/, "\t'extensions/pocketshell/tsconfig.json'\n];");
          content = content.slice(0, compilationsStart) + newArrayBlock + content.slice(compilationsEnd + 2);
          fs.writeFileSync(filePath, content, 'utf8');
          PATCH_EOF
          node /tmp/patch-gulpfile.js

      - name: Patch extensions.ts nodir fix
        if: steps.cache-base.outputs.cache-hit != 'true'
        shell: bash
        run: |
          sed -i "s/gulp.src(dependenciesSrc, { base: '.' })/gulp.src(dependenciesSrc, { base: '.', nodir: true })/g" \
            vendor/vscode/build/lib/extensions.ts

      # ── PocketShell extension (every run) ──────────────────────────────
      - name: Sync extension source
        shell: bash
        run: |
          mkdir -p vendor/vscode/extensions/pocketshell
          cp -r extensions/pocketshell/* vendor/vscode/extensions/pocketshell/
          rm -rf vendor/vscode/extensions/pocketshell/node_modules
          rm -rf vendor/vscode/extensions/pocketshell/out
          rm -f vendor/vscode/extensions/pocketshell/tsconfig.tsbuildinfo

      - name: Install extension npm dependencies
        shell: bash
        run: cd vendor/vscode/extensions/pocketshell && npm install --omit=optional

      - name: Compile PocketShell extension
        shell: bash
        run: |
          cd vendor/vscode
          npm run gulp compile-extension:pocketshell 2>/dev/null || \
            npx tsc -p extensions/pocketshell/tsconfig.json
          test -f extensions/pocketshell/out/extension.js

  # ── Unit tests ────────────────────────────────────────────────────────
  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npm test

  # ── E2E tests ─────────────────────────────────────────────────────────
  test-e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build Docker fixture
        working-directory: test/fixtures/docker
        run: docker compose build

      - name: Start Docker fixture
        working-directory: test/fixtures/docker
        run: docker compose up -d --wait

      - name: Wait for fixture healthy
        working-directory: test/fixtures/docker
        run: |
          timeout 60 bash -c '
            until docker compose ps | grep -q "healthy"; do
              echo "Waiting for fixture to be healthy..."
              sleep 2
            done
            echo "Fixture is healthy"
          '

      - name: Run E2E tests
        run: npx playwright test
        env:
          SSH_HOST: localhost
          SSH_PORT: 2222

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 14

      - name: Collect Docker logs on failure
        if: failure()
        working-directory: test/fixtures/docker
        run: docker compose logs

      - name: Tear down fixture
        if: always()
        working-directory: test/fixtures/docker
        run: docker compose down -v
