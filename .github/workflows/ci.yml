name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  # VS Code core is upstream; pin the exact commit we build against.
  # Must match release.yml.
  VSCODE_REF: 037f7fbe03f78896c841adfd57aea4e0c85ccbc7

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
        timeout-minutes: 10

      - run: npm run lint
        timeout-minutes: 5

  # ── Build (extension compile only) ────────────────────────────────────
  # VS Code core is upstream — the only thing CI validates per-push is that
  # the PocketShell extension compiles. The full core compile + production
  # packaging happens in release.yml on tag pushes and is NOT repeated here.
  build:
    name: Build (extension)
    runs-on: ubuntu-latest
    # Steady-state cache hit ~55 min; 90 min leaves headroom for cold-cache step stalls.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
        timeout-minutes: 10

      - name: Install Linux build deps
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxkbfile-dev libsecret-1-dev libkrb5-dev
        timeout-minutes: 10

      # ── Cache VS Code source + deps (keyed by pinned ref) ──────────────
      # Includes node_modules and the patched gulpfile/extensions.ts so cache
      # hits skip the slow clone+install+patch steps on every run.
      - name: Cache VS Code base
        id: cache-base
        uses: actions/cache@v5
        with:
          path: vendor/vscode
          key: vscode-${{ env.VSCODE_REF }}-ext-compile-v1

      # ── Clone + install (cache miss only) ──────────────────────────────
      - name: Clone VS Code source
        if: steps.cache-base.outputs.cache-hit != 'true'
        timeout-minutes: 10
        shell: bash
        run: |
          mkdir -p vendor
          git clone --depth=1 https://github.com/microsoft/vscode.git vendor/vscode
          cd vendor/vscode
          git fetch --depth=1 origin "${{ env.VSCODE_REF }}"
          git checkout FETCH_HEAD

      # Skip Playwright browser + Electron postinstall downloads: they stall on
      # the runner (matching release.yml). They are not needed to compile the
      # extension.
      - name: Install VS Code dependencies
        if: steps.cache-base.outputs.cache-hit != 'true'
        timeout-minutes: 30
        shell: bash
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: cd vendor/vscode && npm install --foreground-scripts --no-audit --no-fund

      - name: Apply PocketShell VS Code build patches
        shell: bash
        timeout-minutes: 5
        run: node scripts/patch-vscode-build.js

      # ── PocketShell extension (every run) ──────────────────────────────
      - name: Sync extension source
        shell: bash
        timeout-minutes: 5
        run: |
          mkdir -p vendor/vscode/extensions/pocketshell
          cp -r extensions/pocketshell/* vendor/vscode/extensions/pocketshell/
          rm -rf vendor/vscode/extensions/pocketshell/node_modules
          rm -rf vendor/vscode/extensions/pocketshell/out
          rm -f vendor/vscode/extensions/pocketshell/tsconfig.tsbuildinfo

      - name: Install extension npm dependencies
        shell: bash
        timeout-minutes: 10
        run: cd vendor/vscode/extensions/pocketshell && npm install --omit=optional

      - name: Compile PocketShell extension
        shell: bash
        timeout-minutes: 15
        run: |
          cd vendor/vscode
          npm run gulp compile-extension:pocketshell 2>/dev/null || \
            npx tsc -p extensions/pocketshell/tsconfig.json
          test -f extensions/pocketshell/out/extension.js

  # ── Unit tests ────────────────────────────────────────────────────────
  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
        timeout-minutes: 10

      - run: npm test
        timeout-minutes: 10

  # ── E2E tests ─────────────────────────────────────────────────────────
  test-e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 10

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        timeout-minutes: 10

      - name: Build Docker fixture
        working-directory: test/fixtures/docker
        run: docker compose build
        timeout-minutes: 10

      - name: Start Docker fixture
        working-directory: test/fixtures/docker
        run: docker compose up -d --wait
        timeout-minutes: 5

      - name: Wait for fixture healthy
        working-directory: test/fixtures/docker
        timeout-minutes: 2
        run: |
          timeout 60 bash -c '
            until docker compose ps | grep -q "healthy"; do
              echo "Waiting for fixture to be healthy..."
              sleep 2
            done
            echo "Fixture is healthy"
          '

      - name: Run E2E tests
        run: npx playwright test
        timeout-minutes: 10
        env:
          SSH_HOST: localhost
          SSH_PORT: 2222

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 14

      - name: Collect Docker logs on failure
        if: failure()
        working-directory: test/fixtures/docker
        run: docker compose logs

      - name: Tear down fixture
        if: always()
        working-directory: test/fixtures/docker
        run: docker compose down -v
